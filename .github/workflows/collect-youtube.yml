name: Collect YouTube

# Coletor diário do YouTube (olho de dados do Jarvis, conectado à central Watch
# Tower). Lê os canais via YouTube Data API v3 e grava public/youtube-status.json.
# SEM banco (mesmo padrão do check-bulletins) — não precisa de DATABASE_URL.
# Custo: $0 (GitHub Actions free tier · Node 24).

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC ~ 06:00 BRT, 1x por dia
  workflow_dispatch: # trigger manual via UI do GitHub

permissions:
  contents: write

concurrency:
  group: collect-youtube
  cancel-in-progress: false

env:
  # Força actions/checkout e actions/setup-node a rodar em Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run collect-youtube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Canais (sem @, separados por vírgula). Opcional — default WISEHUB-f5y.
          YOUTUBE_HANDLES: ${{ vars.YOUTUBE_HANDLES }}
        run: |
          if [ -z "$YOUTUBE_API_KEY" ]; then
            echo "::notice::YOUTUBE_API_KEY não configurado — nada a fazer (sem regressão)."
            exit 0
          fi
          node scripts/collect-youtube.mjs

      - name: Commit updated status
        run: |
          [ -f public/youtube-status.json ] || { echo "sem JSON gerado — skip"; exit 0; }
          git config user.name "watch-tower-bot"
          git config user.email "watch-tower-bot@users.noreply.github.com"
          git add public/youtube-status.json
          if git diff --staged --quiet; then
            echo "Nenhuma mudança no status do YouTube — skip commit"
            exit 0
          fi
          subs=$(node -e "const d=require('./public/youtube-status.json');console.log(d.channels.map(c=>c.channelName+' '+(c.subscribers||0)+'sub').join(' · ')||'(vazio)');")
          git commit -m "chore(youtube): auto-update status · $subs"
          git push
