name: Check Scheduled Actions

# Dispara as Atividades Programadas vencidas chamando /api/cron/scheduled no app
# (que tem acesso ao DB). Cada atividade ativa cujo horário chegou vira uma
# solicitação ⚡ EXECUTAR pra Friday e re-arma pro próximo horário.
# Job minimalista (só curl) pra gastar pouquíssimo minuto de Actions.
#
# Cadência: a cada 2 horas, alinhado com check-reminders.yml pra compartilhar a
# janela que acorda o Neon (metade do compute de cron). As atividades disparam
# em horários cheios (presets diário/semanal/mensal às 9h); como o disparo usa
# `nextRunAt <= agora`, nada é perdido, só atrasa até ~2h na pior hora.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

concurrency:
  group: check-scheduled
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping scheduled cron
        env:
          WT_APP_URL: ${{ secrets.WT_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$WT_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::notice::WT_APP_URL/CRON_SECRET não configurados — nada a fazer."
            exit 0
          fi
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" -X POST "$WT_APP_URL/api/cron/scheduled" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 60 || echo "000")
          echo "HTTP $code · resposta: $(cat /tmp/resp.txt 2>/dev/null)"
          if [ "$code" != "200" ]; then
            echo "::error::scheduled cron retornou $code"
            exit 1
          fi
