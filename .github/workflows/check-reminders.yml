name: Check Reminders

# Dispara push de lembretes vencidos chamando /api/cron/reminders no app
# (que tem acesso a DB + VAPID). Job minimalista (só curl, sem checkout nem
# setup-node) pra gastar pouquíssimo minuto de Actions.
#
# Cadencia: DE HORA EM HORA (minuto 0), alinhado com check-scheduled.yml.
# Motivo: cada disparo acorda o compute do Neon (free tier suspende apos 5min
# ocioso). A */15 o banco ficava acordado ~1/3 do tempo e estourava as
# 100 CU-horas/mes do plano free (era a causa do aviso de 80% sem ninguem usar).
# No minuto 0, reminders e scheduled acordam o banco na MESMA janela, gastando
# compute uma vez por hora. Lembretes podem atrasar ate ~1h, ok pra uso interno.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: check-reminders
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping reminders cron
        env:
          WT_APP_URL: ${{ secrets.WT_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$WT_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::notice::WT_APP_URL/CRON_SECRET não configurados — nada a fazer."
            exit 0
          fi
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" -X POST "$WT_APP_URL/api/cron/reminders" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 60 || echo "000")
          echo "HTTP $code · resposta: $(cat /tmp/resp.txt 2>/dev/null)"
          if [ "$code" != "200" ]; then
            echo "::error::reminders cron retornou $code"
            exit 1
          fi
