name: Gerar Roteiros WiseHub

# Abre 1x por dia o pedido do LOTE DIÁRIO de roteiros de vídeo dos fundadores
# (Lucas e Marcela · YouTube + Instagram), chamando /api/cron/gerar-roteiros no
# app. O endpoint lê as mudanças frescas dos países e cria um pedido para a
# Friday gerar o lote (a geração em si é curada pela Friday). Job minimalista
# (só curl), no mesmo padrão do check-reminders.yml.

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC ~ 06:00 BRT, 1x por dia
  workflow_dispatch:

concurrency:
  group: gerar-roteiros
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping gerar-roteiros cron
        env:
          WT_APP_URL: ${{ secrets.WT_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$WT_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "::notice::WT_APP_URL/CRON_SECRET não configurados — nada a fazer."
            exit 0
          fi
          code=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" -X POST "$WT_APP_URL/api/cron/gerar-roteiros" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            --max-time 60 || echo "000")
          echo "HTTP $code · resposta: $(cat /tmp/resp.txt 2>/dev/null)"
          if [ "$code" != "200" ]; then
            echo "::error::gerar-roteiros cron retornou $code"
            exit 1
          fi
